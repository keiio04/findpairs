<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip & Match — Welcome to the Abyss</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #8b0000;
            --blood-bright: #ff4444;
            --gold: #ffcc33;
            --bone: #e8d5b0;
            --void: #0a0a0a;
            --ash: #6a5a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--void);
            color: var(--bone);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* ══ Background Effects ══ */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .bg-pentagram {
            position: fixed;
            font-size: 50rem;
            color: var(--blood);
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
            animation: rotate 120s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ══ Content Wrapper ══ */
        .content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding: 20px;
            animation: fadeInUp 1.5s ease;
        }

        .game-logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(139, 0, 0, 0.8), 0 0 60px rgba(255, 204, 51, 0.2);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .welcome-msg {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1rem;
            color: var(--ash);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .story-text {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--bone);
            margin-bottom: 50px;
            font-style: italic;
            opacity: 0.7;
        }

        /* ══ Main Button ══ */
        .enter-btn {
            display: inline-block;
            padding: 18px 45px;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--bone);
            background: linear-gradient(135deg, #8b0000 0%, #450000 100%);
            border: 1px solid rgba(255, 204, 51, 0.3);
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
        }

        .enter-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #a50000 0%, #600000 100%);
            border-color: var(--gold);
            box-shadow: 0 15px 45px rgba(139, 0, 0, 0.6);
            color: #fff;
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ══ Footer ══ */
        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            font-size: 0.6rem;
            color: rgba(232, 213, 176, 0.3);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ══ PWA: Offline indicator bar ══ */
        #offlineBar {
            display:none; position:fixed; top:0; left:0; right:0; z-index:1100;
            background:rgba(30,10,0,0.97); border-bottom:1px solid #ff6600;
            padding:8px 16px; text-align:center;
            font-family:'Cinzel Decorative',serif; font-size:0.6rem;
            color:#ff9944; letter-spacing:0.1em; text-transform:uppercase;
        }
    </style>
</head>
<body>
    <!-- PWA Offline Bar -->
    <div id="offlineBar">Offline Mode — Game saves to your device automatically</div>

    <div class="vignette"></div>
    <div class="bg-pentagram">⛧</div>

    <div class="content">
        <div class="game-logo">Flip & Match</div>
        <div class="welcome-msg">The Nilalang Chronicles</div>
        
        <p class="story-text">
            "Your soul has been summoned to the abyss. <br>
            Flip the cards, match the spirits, and survive the darkness <br>
            that lurks within the ancient folklore."
        </p>

        <a href="auth.html" class="enter-btn">Begin Journey</a>
    </div>

    <footer>ITEL 305 — Technical Project Defense ⛧ 2026</footer>

    <!-- PWA Scripts for Offline Awareness -->
    <script src="pwa.js?v=1"></script>
</body>
</html>
